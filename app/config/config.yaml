data_directory: "data"
backup_interval_seconds: 300  # Periodicity of data storage
database_url: "sqlite:///./decidero.db"  # Path to the SQLite database file
autosave_seconds: 10  # Default activity autosave interval
sqlite:
  journal_mode: "WAL"
  synchronous: "NORMAL"
  busy_timeout_ms: 30000
  write_retries: 5
  retry_backoff_ms: 200
database_pool:
  # SQLite tuning for workshop bursts. Keep conservative to avoid runaway
  # connection pressure while still supporting ~100 concurrent attendees.
  pool_size: 20
  max_overflow: 40
  pool_timeout_seconds: 15
  pool_recycle_seconds: 1800
# Allow participants to join multiple concurrent activities (disable exclusivity checks)
activity_participant_exclusivity: false
default_meeting_settings:
  max_participants: 100
  recording_enabled: true
default_user_password: "TempPass123!"
auth:
  # Keep sessions alive for longer workshops (48 hours here; adjust as needed)
  access_token_expire_minutes: 2880
  # Set true when serving via HTTPS (tunnel or reverse proxy) so auth cookies use Secure.
  secure_cookies: true
  # Guest join toggle: keep false for strict auth-only meetings.
  # Flip to true to allow unauthenticated join flow (/meeting/join + /api/meetings/join).
  allow_guest_join: false
brainstorming:
  idea_character_limit: 500
  max_ideas_per_user: 50
  # Default activity configuration (can be overridden per activity)
  default_maintain_anonymity: false
  default_allow_subcomments: false
  default_auto_jump_new_ideas: true
meeting_refresh:
  enabled: true
  interval_seconds: 8
  hidden_interval_seconds: 45
  failure_backoff_seconds: 60
  # During active write bursts, deprioritize background polling to improve submit success.
  write_priority_backoff_seconds: 8
  # On transient overload statuses (429/502/503/504), stretch refresh cadence temporarily.
  overload_backoff_seconds: 12
  # Randomize refresh timing to avoid synchronized polling spikes.
  jitter_ratio: 0.2
meeting_activity_log:
  max_items: 100
ui_refresh:
  enabled: true
  dashboard_interval_seconds: 20
  admin_users_interval_seconds: 20
  hidden_interval_seconds: 60
  failure_backoff_seconds: 90

# Frontend retry/backoff defaults for auth and in-meeting write reliability.
frontend_reliability:
  write_default:
    retryable_statuses: [429, 502, 503, 504]
    max_retries: 2
    base_delay_ms: 350
    max_delay_ms: 1800
    jitter_ratio: 0.2
    idempotency_header: "X-Idempotency-Key"
  brainstorming_submit:
    retryable_statuses: [429, 502, 503, 504]
    max_retries: 3
    base_delay_ms: 400
    max_delay_ms: 2500
    jitter_ratio: 0.25
    idempotency_header: "X-Idempotency-Key"
  login:
    retryable_statuses: [429, 503]
    max_retries: 2
    base_delay_ms: 450
    max_delay_ms: 1800
    jitter_ratio: 0.2
  # Keep default at 0 until registration idempotency guarantees are expanded.
  registration:
    retryable_statuses: [429, 503]
    max_retries: 0
    base_delay_ms: 450
    max_delay_ms: 1800
    jitter_ratio: 0.2

# ── Meeting Designer AI Model ──────────────────────────────────────────────────
# Configures the AI model used by the AI Meeting Designer feature.
# The feature is DISABLED until provider, api_key, and model are all set.
# No default provider is assumed — you must choose and supply credentials.
#
# Supported providers:
#   anthropic         — Anthropic Claude (claude-opus-4-5, claude-sonnet-4-5, ...)
#   openai            — OpenAI GPT (gpt-4o, gpt-4o-mini, ...)
#   openai_compatible — Any OpenAI-compatible endpoint:
#                       Azure OpenAI, OpenRouter, Ollama, LM Studio, etc.
#
# Azure OpenAI: set provider: openai_compatible, supply your deployment endpoint URL:
#   https://<resource>.openai.azure.com/openai/deployments/<deployment>/chat/completions?api-version=2024-02-01
#
# OpenRouter: set provider: openai_compatible, endpoint_url: https://openrouter.ai/api/v1
#
meeting_designer_model:
  provider: ""          # anthropic | openai | openai_compatible
  api_key: ""           # Your API key for the chosen provider
  endpoint_url: ""      # Required for openai_compatible; optional base URL override for openai
  model: ""             # e.g. claude-opus-4-5, gpt-4o, meta-llama/llama-3.3-70b-instruct
  max_tokens: 2048      # Maximum tokens per AI response
  temperature: 0.7      # Sampling temperature (0.0–1.0; lower = more deterministic)
