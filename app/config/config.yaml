# ═══════════════════════════════════════════════════════════════════════════════
#  DECIDERO GDSS — Application Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
#  ┌─────────────────────────────────────────────────────────────────────────┐
#  │  SECTION A — Infrastructure  (requires app restart to change)           │
#  │                                                                         │
#  │  These values are read at startup and are NOT exposed in the Settings   │
#  │  UI.  Edit this file and restart the server to apply changes.           │
#  └─────────────────────────────────────────────────────────────────────────┘
#
#  ┌─────────────────────────────────────────────────────────────────────────┐
#  │  SECTION B — Operational Defaults  (Settings UI overrides these)        │
#  │                                                                         │
#  │  These are INITIAL values used when no Admin has saved an override via  │
#  │  the Settings page (/settings → Admin Settings).  Once an Admin saves   │
#  │  a value in the UI, the database value takes precedence over what is    │
#  │  written here.                                                           │
#  │                                                                         │
#  │  To revert a value back to what is written here, use the "Reset to      │
#  │  Default" button in the Settings UI (or DELETE the row from the         │
#  │  app_settings database table).                                           │
#  └─────────────────────────────────────────────────────────────────────────┘


# ─── SECTION A: Infrastructure ─────────────────────────────────────────────────

data_directory: "data"
backup_interval_seconds: 300        # Periodicity of data storage
database_url: "sqlite:///./decidero.db"  # Path to the SQLite database file
autosave_seconds: 10                # Default activity autosave interval (startup-time)

sqlite:
  journal_mode: "WAL"
  synchronous: "NORMAL"
  busy_timeout_ms: 30000
  write_retries: 5
  retry_backoff_ms: 200

database_pool:
  # SQLite tuning for workshop bursts. Keep conservative to avoid runaway
  # connection pressure while still supporting ~100 concurrent attendees.
  pool_size: 20
  max_overflow: 40
  pool_timeout_seconds: 15
  pool_recycle_seconds: 1800

auth:
  # ── Infrastructure-only (Section A) ──
  # Set via DECIDERO_SECURE_COOKIES env var in production (takes priority over this).
  secure_cookies: true

  # ── Operational defaults (Section B) — overrideable via Settings UI ──
  # Keep sessions alive for longer workshops (48 hours; adjust as needed).
  access_token_expire_minutes: 2880
  # Guest join toggle: keep false for strict auth-only meetings.
  # Flip to true to allow unauthenticated join flow (/meeting/join + /api/meetings/join).
  allow_guest_join: false
  # Login rate limiting — also overrideable via env vars (highest priority):
  #   DECIDERO_LOGIN_RATE_LIMIT_ENABLED, _WINDOW_SECONDS, _MAX_FAILURES_PER_USERNAME,
  #   _MAX_FAILURES_PER_IP, _LOCKOUT_SECONDS
  login_rate_limit:
    enabled: true
    window_seconds: 60
    max_failures_per_username: 8
    max_failures_per_ip: 40
    lockout_seconds: 60

meeting_refresh:
  # Polling tuning — devops/sysadmin level. Not exposed in Settings UI.
  enabled: true
  interval_seconds: 8
  hidden_interval_seconds: 45
  failure_backoff_seconds: 60
  # During active write bursts, deprioritize background polling to improve submit success.
  write_priority_backoff_seconds: 8
  # On transient overload statuses (429/502/503/504), stretch refresh cadence temporarily.
  overload_backoff_seconds: 12
  # Randomize refresh timing to avoid synchronized polling spikes.
  jitter_ratio: 0.2

meeting_activity_log:
  max_items: 100

ui_refresh:
  # Polling tuning — not exposed in Settings UI.
  enabled: true
  dashboard_interval_seconds: 20
  admin_users_interval_seconds: 20
  hidden_interval_seconds: 60
  failure_backoff_seconds: 90

# Frontend retry/backoff — baked into shipped JS. Not exposed in Settings UI.
frontend_reliability:
  write_default:
    retryable_statuses: [429, 502, 503, 504]
    max_retries: 2
    base_delay_ms: 350
    max_delay_ms: 1800
    jitter_ratio: 0.2
    idempotency_header: "X-Idempotency-Key"
  brainstorming_submit:
    retryable_statuses: [429, 502, 503, 504]
    max_retries: 3
    base_delay_ms: 400
    max_delay_ms: 2500
    jitter_ratio: 0.25
    idempotency_header: "X-Idempotency-Key"
  login:
    retryable_statuses: [429, 503]
    max_retries: 2
    base_delay_ms: 450
    max_delay_ms: 1800
    jitter_ratio: 0.2
  # Keep default at 0 until registration idempotency guarantees are expanded.
  registration:
    retryable_statuses: [429, 503]
    max_retries: 0
    base_delay_ms: 450
    max_delay_ms: 1800
    jitter_ratio: 0.2


# ─── SECTION B: Operational Defaults ──────────────────────────────────────────
#
#  All settings below are overrideable at runtime via the Settings page.
#  Database overrides take priority over these values.
#  Reset to these values by using "Reset to Default" in the Settings UI.

# Overrideable in Settings UI → Meeting Defaults tab
default_user_password: "TempPass123!"

# Overrideable in Settings UI → Meeting Defaults tab
default_meeting_settings:
  max_participants: 100
  recording_enabled: true

# Allow participants to join multiple concurrent activities (disable exclusivity checks).
# Overrideable in Settings UI → Meeting Defaults tab
activity_participant_exclusivity: false

# Overrideable in Settings UI → Brainstorming tab
brainstorming:
  idea_character_limit: 500
  max_ideas_per_user: 50
  # Default activity configuration (can be overridden per-activity when creating a meeting)
  default_maintain_anonymity: false
  default_allow_subcomments: false
  default_auto_jump_new_ideas: true

# ── AI Meeting Designer ────────────────────────────────────────────────────────
# Configures the AI model used by the AI Meeting Designer feature.
# The feature is DISABLED until provider, api_key, and model are all non-empty.
#
# RECOMMENDED: Configure via Settings UI → AI Config tab.  The UI stores the
# api_key encrypted in the database, which is more secure than plain text here.
#
# Supported providers:
#   anthropic         — Anthropic Claude (claude-opus-4-5, claude-sonnet-4-5, ...)
#   openai            — OpenAI GPT (gpt-4o, gpt-4o-mini, ...)
#   openai_compatible — Any OpenAI-compatible endpoint:
#                       Azure OpenAI, OpenRouter, Ollama, LM Studio, etc.
#
# Azure OpenAI: set provider: openai_compatible, supply your deployment endpoint URL:
#   https://<resource>.openai.azure.com/openai/deployments/<deployment>/chat/completions?api-version=2024-02-01
#
# OpenRouter: set provider: openai_compatible, endpoint_url: https://openrouter.ai/api/v1
#
meeting_designer_model:
  provider: ""          # anthropic | openai | openai_compatible
  api_key: ""           # Your API key — prefer setting via Settings UI for encrypted storage
  endpoint_url: ""      # Required for openai_compatible; optional base URL override for openai
  model: ""             # e.g. claude-opus-4-5, gpt-4o, meta-llama/llama-3.3-70b-instruct
  max_tokens: 2048      # Maximum tokens per AI response
  temperature: 0.7      # Sampling temperature (0.0–1.0; lower = more deterministic)
